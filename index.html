<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>المهندس أحمد بوكر العقيلي - مدرّب الأسواق المالية</title>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@300;400;500;600;700&family=Amiri:wght@400;700&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #080818;
      font-family: 'IBM Plex Sans Arabic', sans-serif;
      direction: rtl;
      overflow-x: hidden;
    }
    @keyframes fadeSlideIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes bounce {
      0%, 80%, 100% { transform: translateY(0); opacity: 0.4; }
      40% { transform: translateY(-6px); opacity: 1; }
    }
    @keyframes shimmer {
      0% { background-position: -200% center; }
      100% { background-position: 200% center; }
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.6; }
    }
    @keyframes starFloat {
      0% { transform: translateY(0) rotate(0deg); opacity: 0.3; }
      50% { opacity: 0.8; }
      100% { transform: translateY(-20px) rotate(360deg); opacity: 0.3; }
    }
    ::-webkit-scrollbar { width: 5px; }
    ::-webkit-scrollbar-track { background: #0d0d20; }
    ::-webkit-scrollbar-thumb { background: #C9A84C44; border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: #C9A84C88; }

    body {
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      background: linear-gradient(180deg, #080818 0%, #0d0d25 50%, #080818 100%);
    }
    .app-container {
      width: 100%;
      max-width: 800px;
      height: 100vh;
      display: flex;
      flex-direction: column;
      position: relative;
      box-shadow: 0 0 60px rgba(0,0,0,0.5);
    }
    .stars {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      pointer-events: none; z-index: 0;
    }
    .star {
      position: absolute;
      width: 2px; height: 2px;
      background: #C9A84C;
      border-radius: 50%;
      animation: starFloat 4s ease-in-out infinite;
      opacity: 0.2;
    }
    header {
      background: linear-gradient(135deg, #0d0d20 0%, #12122a 100%);
      border-bottom: 1px solid rgba(201,168,76,0.2);
      padding: 16px 20px;
      display: flex; align-items: center; gap: 14px;
      box-shadow: 0 4px 30px rgba(0,0,0,0.5);
      position: sticky; top: 0; z-index: 100;
    }
    .avatar {
      width: 52px; height: 52px; border-radius: 50%;
      background: linear-gradient(135deg, #C9A84C 0%, #6B4E11 100%);
      display: flex; align-items: center; justify-content: center;
      font-size: 24px;
      box-shadow: 0 0 20px rgba(201,168,76,0.4);
    }
    .header-text h1 {
      font-family: 'Amiri', serif;
      font-size: 16px; font-weight: 700;
      background: linear-gradient(90deg, #C9A84C, #FFD700, #C9A84C);
      background-size: 200% auto;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      animation: shimmer 3s linear infinite;
    }
    .header-text .status {
      font-size: 12px; color: #6a6a8a; margin-top: 2px;
    }
    .online-dot {
      width: 10px; height: 10px; border-radius: 50%;
      background: #4ade80;
      animation: pulse 2s ease-in-out infinite;
      box-shadow: 0 0 8px #4ade80;
    }
    .topics-bar {
      padding: 12px 16px;
      border-bottom: 1px solid rgba(201,168,76,0.1);
      background: rgba(13,13,32,0.8);
      display: flex; gap: 8px; overflow-x: auto;
    }
    .topic-btn {
      display: flex; flex-direction: column; align-items: center; gap: 4px;
      padding: 10px 8px;
      background: rgba(201,168,76,0.06);
      border: 1px solid rgba(201,168,76,0.15);
      border-radius: 12px;
      cursor: pointer;
      font-family: inherit; font-size: 11px;
      color: #a09070;
      transition: all 0.2s;
      white-space: nowrap;
    }
    .topic-btn:hover, .topic-btn.active {
      background: rgba(201,168,76,0.15);
      border-color: rgba(201,168,76,0.4);
      color: #C9A84C;
      transform: translateY(-2px);
    }
    .chat-area {
      flex: 1;
      overflow-y: auto;
      padding: 20px 16px;
      display: flex; flex-direction: column;
    }
    .message {
      display: flex; margin-bottom: 16px;
      animation: fadeSlideIn 0.3s ease-out;
    }
    .message.assistant { justify-content: flex-start; }
    .message.user { justify-content: flex-end; }
    .msg-avatar {
      width: 38px; height: 38px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 16px; flex-shrink: 0;
    }
    .assistant .msg-avatar {
      background: linear-gradient(135deg, #C9A84C, #8B6914);
      margin-left: 8px;
      box-shadow: 0 2px 8px rgba(201,168,76,0.4);
    }
    .user .msg-avatar {
      background: linear-gradient(135deg, #2a2a4a, #1a1a3a);
      margin-right: 8px;
      border: 1px solid rgba(201,168,76,0.3);
    }
    .msg-content {
      max-width: 75%;
      padding: 14px 18px;
      font-size: 14px; line-height: 1.75;
      white-space: pre-wrap; word-break: break-word;
      border-radius: 18px;
    }
    .assistant .msg-content {
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
      color: #e8e0d0;
      border: 1px solid rgba(201,168,76,0.2);
      border-radius: 4px 18px 18px 18px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.3);
    }
    .user .msg-content {
      background: linear-gradient(135deg, #C9A84C 0%, #8B6914 100%);
      color: #0d0d1a;
      border-radius: 18px 4px 18px 18px;
      box-shadow: 0 4px 20px rgba(201,168,76,0.3);
    }
    .typing-indicator {
      display: flex; align-items: center; gap: 6px;
      padding: 12px 16px;
    }
    .typing-dot {
      width: 8px; height: 8px; border-radius: 50%;
      background: #C9A84C;
      animation: bounce 1.2s infinite;
    }
    .quick-bar {
      padding: 10px 16px 6px;
      background: rgba(8,8,24,0.95);
      display: flex; gap: 8px; overflow-x: auto;
    }
    .quick-btn {
      background: rgba(201,168,76,0.08);
      border: 1px solid rgba(201,168,76,0.25);
      color: #C9A84C;
      padding: 7px 14px;
      border-radius: 20px;
      font-size: 12px;
      cursor: pointer;
      font-family: inherit;
      transition: all 0.2s;
      white-space: nowrap;
    }
    .quick-btn:hover {
      background: rgba(201,168,76,0.18);
      border-color: rgba(201,168,76,0.5);
    }
    .input-area {
      padding: 12px 16px 16px;
      background: linear-gradient(180deg, rgba(8,8,24,0.95) 0%, #0a0a1e 100%);
      border-top: 1px solid rgba(201,168,76,0.15);
    }
    .input-box {
      display: flex; gap: 10px; align-items: flex-end;
      background: rgba(20,20,40,0.8);
      border-radius: 20px;
      border: 1px solid rgba(201,168,76,0.25);
      padding: 8px 12px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.3);
    }
    textarea {
      flex: 1; background: transparent; border: none;
      color: #e8e0d0; font-size: 14px; line-height: 1.6;
      font-family: inherit; direction: rtl;
      resize: none; max-height: 100px; overflow-y: auto;
    }
    textarea:focus { outline: none; }
    .send-btn {
      background: linear-gradient(135deg, #C9A84C, #8B6914);
      border: none; border-radius: 50%;
      width: 42px; height: 42px;
      cursor: pointer; font-size: 18px;
      display: flex; align-items: center; justify-content: center;
      transition: all 0.2s; flex-shrink: 0;
      box-shadow: 0 2px 10px rgba(201,168,76,0.3);
    }
    .send-btn:disabled { opacity: 0.4; cursor: not-allowed; }
    .send-btn:hover:not(:disabled) {
      transform: scale(1.08);
      box-shadow: 0 4px 16px rgba(201,168,76,0.5);
    }
    .disclaimer {
      text-align: center; font-size: 10px; color: #3a3a5a; margin-top: 8px;
    }
  </style>
</head>
<body>
<div class="app-container">
  <!-- نجوم الخلفية -->
  <div class="stars" id="starsContainer"></div>

  <!-- الرأس -->
  <header>
    <div class="avatar">👨‍💼</div>
    <div class="header-text">
      <h1>المهندس أحمد بوكر العقيلي</h1>
      <div class="status">مدرّب أسواق مالية معتمد • متاح الآن</div>
    </div>
    <div class="online-dot"></div>
  </header>

  <!-- شريط المواضيع -->
  <div class="topics-bar" id="topicsBar"></div>

  <!-- المحادثة -->
  <div class="chat-area" id="chatArea"></div>

  <!-- مطالبات سريعة -->
  <div class="quick-bar" id="quickBar"></div>

  <!-- الإدخال -->
  <div class="input-area">
    <div class="input-box">
      <textarea id="userInput" rows="1" placeholder="اكتب سؤالك هنا…"></textarea>
      <button class="send-btn" id="sendBtn">➤</button>
    </div>
    <div class="disclaimer">للتعلم فقط • ليس توصية مالية • استخدم حساباً تجريبياً</div>
  </div>
</div>

<script>
  (function() {
    // ========== بيانات ثابتة ==========
    const SYSTEM_PROMPT = `أنت "المهندس أحمد بوكر العقيلي"، مدرّب أسواق مالية...`; // تم اختصاره هنا للتوضيح

    const OPENING_MESSAGE = {
      role: "assistant",
      content: `أهلاً وسهلاً! 🌟\n\nأنا **المهندس أحمد بوكر العقيلي**، مدرّبك الخاص في عالم الأسواق المالية.\n\nسواء كنت لا تعرف شيئاً عن البورصة، أو سمعت عنها وتريد أن تفهم أكثر — أنا هنا معك خطوة بخطوة، بلا تعقيد ولا ضغط.\n\nقبل أن نبدأ، سؤال واحد فقط:\n\n**هل تفضل البدء من الأساسيات المطلقة** (ما هو السهم؟ ما هي البورصة؟)، **أم لديك فكرة مسبقة عن السوق** وتريد الانتقال مباشرة لنقطة معينة كالتحليل الفني مثلاً؟\n\nأخبرني وننطلق! 🚀`
    };

    const topics = [
      { id: "basics", label: "الأساسيات", icon: "🏗️" },
      { id: "markets", label: "البورصات", icon: "🌍" },
      { id: "fundamental", label: "التحليل الأساسي", icon: "🔬" },
      { id: "technical", label: "التحليل الفني", icon: "📈" },
      { id: "candles", label: "الشموع اليابانية", icon: "🕯️" },
    ];

    const quickPrompts = [
      "ابدأ من الصفر معي",
      "ما هو السهم؟",
      "اشرح لي P/E",
      "ما هي الشمعة اليابانية؟",
      "ما هي البورصات الخليجية؟",
      "اشرح الدعم والمقاومة",
    ];

    // ردود محاكاة ذكية (تعتمد على كلمات مفتاحية)
    const mockReplies = {
      "اسهم|سهم": "السهم هو حصة ملكية في شركة. عندما تشتري سهماً، تصبح شريكاً بنسبة صغيرة. تربح من ارتفاع سعره (مكاسب رأسمالية) أو من توزيعات الأرباح. 📌",
      "بورصه|بورصة|بورصات|تاسي|تداول|سوق": "سوق الأسهم (البورصة) مثل سوق مركزي يجتمع فيه البائعون والمشترون عبر منصة إلكترونية. في السعودية: السوق السعودي (تداول) ومؤشره TASI. وفي الإمارات: سوق دبي المالي وسوق أبوظبي. عالمياً: وول ستريت (NYSE) وناسداك.",
      "pe|p/e|مكرر|ربحيه|ربحية": "مكرر الربحية (P/E) يعني: كم سنة تحتاج لاسترداد رأس مالك من أرباح الشركة. إذا كان السهم سعره 100 ريال وربحيته السنوية 10 ريال، فالمكرر = 10. منخفض قد يكون فرصة، لكن يحتاج تحليل أعمق.",
      "تحليل اساسي|اساسي": "التحليل الأساسي هو 'فحص طبي' للشركة. ننظر للقوائم المالية، الأرباح، الإيرادات. الأدوات: ربحية السهم (EPS)، مكرر الربح (P/E)، القيمة الدفترية (P/B). مثال: سابك وأرامكو.",
      "تحليل فني|فني|دعم|مقاومه|مقاومة": "التحليل الفني يعتمد على الرسم البياني. الدعم: مستوى يرتد منه السعر صعوداً. المقاومة: سقف يصعب اختراقه. الاتجاه قد يكون صاعداً أو هابطاً أو عرضياً.",
      "شمعه|شمعة|شموع|يابانيه|يابانية|doji|دوجي": "الشموع اليابانية تظهر سعر الافتتاح والإغلاق وأعلى وأدنى سعر. الدوجي: افتتاح وإغلاق متساويان = تردد. الابتلاع الشرائي: شمعة خضراء تبتلع حمراء = انعكاس صاعد محتمل.",
      "تجريبي|حساب": "الحساب التجريبي هو ملعبك الآمن. تتعلم بدون مخاطرة. أنصحك تبدأ به قبل أي تداول حقيقي.",
      "توصيه|توصية|اشتري|اشتري سهم|هل اشتري": "لا أقدم توصيات شراء أو بيع، لكني أعلمك كيف تحلل السهم بنفسك. أعطني اسم الشركة وسأطبق معك الأدوات.",
      "مرحبا|اهلا|هلا": "أهلاً بك! كيف أقدر أساعدك اليوم في رحلتك التعليمية؟",
    };

    function getMockReply(userInput) {
      const text = userInput.toLowerCase();
      for (const [pattern, reply] of Object.entries(mockReplies)) {
        if (new RegExp(pattern).test(text)) {
          return reply;
        }
      }
      return "شكراً لسؤالك. في النسخة التجريبية هذه، يمكنك سؤالي عن: الأساسيات، البورصات، التحليل الأساسي والفني، الشموع اليابانية. أو اختر من الأزرار أعلاه. 🔍";
    }

    // ========== بناء الواجهة ==========
    const starsContainer = document.getElementById('starsContainer');
    for (let i = 0; i < 20; i++) {
      const star = document.createElement('div');
      star.className = 'star';
      star.style.top = Math.random() * 100 + '%';
      star.style.left = Math.random() * 100 + '%';
      star.style.animationDelay = Math.random() * 4 + 's';
      star.style.animationDuration = (3 + Math.random() * 4) + 's';
      starsContainer.appendChild(star);
    }

    const topicsBar = document.getElementById('topicsBar');
    topics.forEach(t => {
      const btn = document.createElement('button');
      btn.className = 'topic-btn';
      btn.innerHTML = `<span style="font-size:18px">${t.icon}</span><span>${t.label}</span>`;
      btn.addEventListener('click', () => {
        const prompts = {
          basics: "اشرح لي ما هو سوق الأسهم والبورصة من الصفر",
          markets: "اشرح لي البورصات الخليجية والأجنبية",
          fundamental: "اشرح لي التحليل الأساسي للأسهم",
          technical: "اشرح لي التحليل الفني والرسم البياني",
          candles: "اشرح لي الشموع اليابانية من البداية",
        };
        sendMessage(prompts[t.id]);
      });
      topicsBar.appendChild(btn);
    });

    const quickBar = document.getElementById('quickBar');
    quickPrompts.forEach(p => {
      const btn = document.createElement('button');
      btn.className = 'quick-btn';
      btn.textContent = p;
      btn.addEventListener('click', () => sendMessage(p));
      quickBar.appendChild(btn);
    });

    const chatArea = document.getElementById('chatArea');
    const userInput = document.getElementById('userInput');
    const sendBtn = document.getElementById('sendBtn');

    function addMessage(role, content) {
      const msgDiv = document.createElement('div');
      msgDiv.className = `message ${role}`;
      const avatar = document.createElement('div');
      avatar.className = 'msg-avatar';
      avatar.textContent = role === 'assistant' ? '👨‍💼' : '👤';
      const contentDiv = document.createElement('div');
      contentDiv.className = 'msg-content';
      contentDiv.textContent = content;
      msgDiv.appendChild(avatar);
      msgDiv.appendChild(contentDiv);
      chatArea.appendChild(msgDiv);
      chatArea.scrollTop = chatArea.scrollHeight;
    }

    function showTyping() {
      const typingDiv = document.createElement('div');
      typingDiv.className = 'message assistant';
      typingDiv.id = 'typingIndicator';
      const avatar = document.createElement('div');
      avatar.className = 'msg-avatar';
      avatar.textContent = '👨‍💼';
      const indicator = document.createElement('div');
      indicator.className = 'msg-content typing-indicator';
      for (let i = 0; i < 3; i++) {
        const dot = document.createElement('div');
        dot.className = 'typing-dot';
        dot.style.animationDelay = (i * 0.2) + 's';
        indicator.appendChild(dot);
      }
      typingDiv.appendChild(avatar);
      typingDiv.appendChild(indicator);
      chatArea.appendChild(typingDiv);
      chatArea.scrollTop = chatArea.scrollHeight;
    }

    function hideTyping() {
      const el = document.getElementById('typingIndicator');
      if (el) el.remove();
    }

    function sendMessage(text) {
      const trimmed = text.trim();
      if (!trimmed) return;
      userInput.value = '';
      addMessage('user', trimmed);
      showTyping();
      setTimeout(() => {
        hideTyping();
        const reply = getMockReply(trimmed);
        addMessage('assistant', reply);
      }, 1200);
    }

    sendBtn.addEventListener('click', () => sendMessage(userInput.value));
    userInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        sendMessage(userInput.value);
      }
    });

    // عرض رسالة الترحيب
    addMessage('assistant', OPENING_MESSAGE.content);
  })();
</script>
</body>
</html>
